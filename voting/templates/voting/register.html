<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | ChainVote</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
                    },
                    colors: {
                        apple: {
                            light: '#f5f5f7',
                            dark: '#000000',
                            cardLight: 'rgba(255, 255, 255, 0.7)',
                            cardDark: 'rgba(28, 28, 30, 0.5)',
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        body { 
            transition: background-color 0.5s ease, color 0.5s ease; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .glass-panel {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
        }
        .dark .glass-panel {
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .ambient-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.25; 
            z-index: -1;
            animation: float 20s ease-in-out infinite alternate;
        }
        .dark .ambient-blob { opacity: 0.15; filter: blur(100px); }
        
        .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: #3b82f6; animation-delay: 0s; }
        .blob-2 { top: 40%; right: -10%; width: 60vw; height: 60vw; background: #8b5cf6; animation-delay: -5s; }
        .blob-3 { bottom: -20%; left: 20%; width: 50vw; height: 50vw; background: #10b981; animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(5%, 10%) scale(1.1); }
            66% { transform: translate(-5%, 5%) scale(0.9); }
            100% { transform: translate(0, -10%) scale(1); }
        }

        .reveal-hidden { 
            opacity: 0; 
            transform: translateY(20px); 
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        .reveal-visible { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="bg-apple-light text-gray-900 dark:bg-apple-dark dark:text-gray-100 selection:bg-blue-500 selection:text-white min-h-screen flex flex-col">

    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <div class="fixed inset-0 overflow-hidden pointer-events-none z-[-1]">
        <div class="ambient-blob blob-1"></div>
        <div class="ambient-blob blob-2"></div>
        <div class="ambient-blob blob-3"></div>
    </div>

    <nav class="fixed top-0 w-full z-50 glass-panel bg-white/70 dark:bg-black/50 border-b border-gray-200/50 dark:border-white/5">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="{% url 'home' %}" class="flex items-center space-x-2">
                <div class="w-6 h-6 rounded-full bg-black dark:bg-white flex items-center justify-center">
                    <span class="text-white dark:text-black font-bold text-xs">C</span>
                </div>
                <span class="text-lg font-semibold tracking-tight">ChainVote</span>
            </a>
            
            <div class="flex items-center space-x-6">
                <button id="theme-toggle" class="text-gray-600 hover:text-black dark:text-gray-500 dark:hover:text-white transition">
                    <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                    <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"></path></svg>
                </button>
                <a href="{% url 'login' %}" class="text-sm font-medium bg-black text-white dark:bg-white dark:text-black px-4 py-1.5 rounded-full hover:scale-105 transition transform shadow-sm">Log In</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center px-6 pt-32 pb-24 relative z-10">
        <div class="w-full max-w-md reveal-hidden">
            <div class="bg-apple-cardLight dark:bg-apple-cardDark glass-panel rounded-[2.5rem] p-8 md:p-10 border border-gray-200/60 dark:border-white/5 shadow-2xl">
                <div class="text-center mb-10">
                    <div class="w-16 h-16 bg-black dark:bg-white rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg">
                        <span class="text-white dark:text-black text-3xl font-bold">C</span>
                    </div>
                    <h1 class="text-3xl font-bold tracking-tight text-black dark:text-white">Create Account</h1>
                    <p class="text-gray-600 dark:text-gray-400 mt-2 font-medium">Join the decentralized network</p>
                </div>

                {% if messages %}
                    <div class="mb-6 space-y-2">
                        {% for message in messages %}
                            <div class="p-3 rounded-xl text-sm font-medium {% if message.tags == 'error' %}bg-red-500/10 text-red-600 dark:text-red-400 border border-red-500/20{% else %}bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 border border-emerald-500/20{% endif %}">
                                {{ message }}
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}

                <form method="POST" class="space-y-6">
                    {% csrf_token %}
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2 ml-1" for="username">Username</label>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            class="w-full bg-white dark:bg-black/40 border border-gray-200 dark:border-white/10 rounded-2xl px-5 py-4 text-black dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition shadow-sm"
                            placeholder="Choose a username"
                            required
                            autofocus
                        >
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2 ml-1" for="password">Password</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="w-full bg-white dark:bg-black/40 border border-gray-200 dark:border-white/10 rounded-2xl px-5 py-4 text-black dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition shadow-sm"
                            placeholder="Create a password"
                            required
                        >
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2 ml-1" for="password2">Confirm Password</label>
                        <input
                            type="password"
                            id="password2"
                            name="password2"
                            class="w-full bg-white dark:bg-black/40 border border-gray-200 dark:border-white/10 rounded-2xl px-5 py-4 text-black dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition shadow-sm"
                            placeholder="Repeat your password"
                            required
                        >
                    </div>
                    
                    <button type="submit" class="w-full bg-black text-white dark:bg-white dark:text-black py-4 rounded-2xl font-bold text-lg hover:scale-[1.02] active:scale-[0.98] transition transform shadow-xl">
                        Create Account →
                    </button>
                </form>

                <div class="mt-8 text-center">
                    <p class="text-gray-500 dark:text-gray-500 text-sm font-medium">
                        Already have an account? 
                        <a href="{% url 'login' %}" class="text-black dark:text-white hover:underline decoration-2 underline-offset-4">Sign in here</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <footer class="border-t border-gray-200/60 dark:border-white/5 bg-white/70 dark:bg-black/20 backdrop-blur-md relative z-10">
        <div class="max-w-6xl mx-auto px-6 py-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center space-x-2">
                <div class="w-5 h-5 rounded-full bg-black dark:bg-white flex items-center justify-center">
                    <span class="text-white dark:text-black font-bold text-[10px]">C</span>
                </div>
                <span class="font-semibold tracking-tight text-sm text-black dark:text-white">ChainVote</span>
            </div>
            <p class="text-xs text-gray-500 dark:text-gray-500 font-medium">
                Secure & Decentralized Voting Protocol
            </p>
        </div>
    </footer>

    <script>
        // Theme Toggle Logic
        const themeToggleBtn = document.getElementById('theme-toggle');
        const darkIcon = document.getElementById('theme-toggle-dark-icon');
        const lightIcon = document.getElementById('theme-toggle-light-icon');

        if (document.documentElement.classList.contains('dark')) { lightIcon.classList.remove('hidden'); } 
        else { darkIcon.classList.remove('hidden'); }

        themeToggleBtn.addEventListener('click', function() {
            darkIcon.classList.toggle('hidden'); lightIcon.classList.toggle('hidden');
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
            }
        });

        // Reveal animation
        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
                document.querySelector('.reveal-hidden').classList.add('reveal-visible');
            }, 100);
        });
    </script>
</body>
</html>
